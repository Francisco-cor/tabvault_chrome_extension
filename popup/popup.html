<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabVault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="3" width="20" height="18" rx="3" fill="#7c3aed"/>
        <circle cx="12" cy="12" r="4" fill="#0d0d14" stroke="#e2e0f0" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="1.5" fill="#7c3aed"/>
        <circle cx="6"  cy="7"  r="1.2" fill="rgba(226,224,240,0.5)"/>
        <circle cx="18" cy="7"  r="1.2" fill="rgba(226,224,240,0.5)"/>
        <circle cx="6"  cy="17" r="1.2" fill="rgba(226,224,240,0.5)"/>
        <circle cx="18" cy="17" r="1.2" fill="rgba(226,224,240,0.5)"/>
      </svg>
      <span class="logo-text">TabVault</span>
    </div>
    <div class="header-actions">
      <button id="btn-import" class="icon-btn" title="Import backup">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button id="btn-export-all" class="icon-btn" title="Export all data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
    </div>
  </header>

  <!-- Nav -->
  <nav class="nav-tabs">
    <button class="nav-tab active" data-view="sessions">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Sessions
      <span class="nav-badge" id="sessions-count"></span>
    </button>
    <button class="nav-tab" data-view="groups">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
      Live Groups
    </button>
    <button class="nav-tab" data-view="search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
  </nav>

  <!-- Content -->
  <main class="content" id="content">
    <!-- Rendered by popup.js -->
  </main>

  <!-- Save Session Modal -->
  <div class="modal-overlay" id="save-modal" hidden>
    <div class="modal">
      <h3 class="modal-title">Save Session</h3>
      <input id="session-name-input" class="modal-input" type="text" placeholder="Session name…" maxlength="80">
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept=".json" style="display:none">

  <script type="module" src="popup.js"></script>
</body>
</html>
